services:
  vslf-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vslf-backend
    restart: unless-stopped
    networks:
      - caddy_net

  vslf-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=/api
    container_name: vslf-frontend
    restart: unless-stopped
    depends_on:
      - vslf-backend
    networks:
      - caddy_net

networks:
  caddy_net:
    external: true